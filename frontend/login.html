<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NMIMS Campus Ride Share</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="nav-brand" onclick="window.location.href='index.html'">
            <img src="images/nmims-logo.jpg" alt="NMIMS Logo" style="height: 45px; width: auto; margin-right: 10px;">
            <span>Campus</span>Ride
        </div>
        <div class="nav-links">
            <button class="nav-btn" onclick="window.location.href='rides.html'">Find Ride</button>
            <button class="nav-btn" onclick="window.location.href='login.html'">Login</button>
            <button class="btn btn-primary btn-sm" onclick="window.location.href='register.html'">Sign Up</button>
        </div>
    </nav>

    <div class="auth-page">
        <div class="auth-card">
            <div class="auth-logo">
                <img src="images/nmims-logo.jpg" alt="NMIMS Logo" style="height: 60px; margin-bottom: 15px;" onerror="this.style.display='none'">
                <h2 style="color: #dc2626;">NMIMS CampusRide</h2>
                <p>Sign in to your account</p>
            </div>
            <div class="alert" id="login-alert"></div>
            <form onsubmit="login(event)">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" id="email" class="form-input" placeholder="you@nmims.edu" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary btn-full">Sign In</button>
            </form>
            <div class="auth-switch">Don't have an account? <a href="register.html">Register</a></div>
        </div>
    </div>

    <script>
        const API = 'http://localhost:5000/api';
        
        async function login(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const alertDiv = document.getElementById('login-alert');
            
            alertDiv.classList.remove('show');
            
            try {
                const res = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await res.json();
                
                if (!res.ok) {
                    alertDiv.textContent = data.message;
                    alertDiv.className = 'alert alert-error show';
                    return;
                }
                
                localStorage.setItem('crs_token', data.token);
                localStorage.setItem('crs_user', JSON.stringify(data.user));
                
                if (data.user.role === 'admin') {
                    window.location.href = 'admin.html';
                } else {
                    window.location.href = 'dashboard.html';
                }
            } catch (error) {
                alertDiv.textContent = 'Connection error. Make sure backend is running.';
                alertDiv.className = 'alert alert-error show';
            }
        }
        
        // Redirect if already logged in
        const token = localStorage.getItem('crs_token');
        if (token) {
            window.location.href = 'dashboard.html';
        }
    </script>
</body>
</html>
